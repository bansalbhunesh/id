<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>UdyamPulse - MSME Credit Review</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Azeret+Mono:wght@500;600;700&family=Libre+Baskerville:wght@400;700&family=Source+Sans+3:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%231B2A2F'/%3E%3Cpath d='M8 9h16v2H8zM8 15h16v2H8zM8 21h10v2H8z' fill='%23F4EBDD'/%3E%3Cpath d='M20 19h5v5h-5z' fill='%235B4A8B'/%3E%3C/svg%3E" />
<style>
  :root {
    color-scheme: light;
    --ledger-ink: #1B2A2F;
    --passbook-paper: #F4EBDD;
    --gst-ruled-blue: #2E5E7E;
    --stamp-violet: #5B4A8B;
    --marigold-audit: #C88A2D;
    --entry-red: #9B3A32;
    --ink-muted: color-mix(in srgb, var(--ledger-ink) 60%, white);
    --line: color-mix(in srgb, var(--ledger-ink) 15%, transparent);
    --line-strong: color-mix(in srgb, var(--ledger-ink) 30%, transparent);
    --veil: color-mix(in srgb, var(--passbook-paper) 66%, transparent);
    --veil-strong: color-mix(in srgb, var(--passbook-paper) 86%, white 6%);
    --violet-veil: color-mix(in srgb, var(--stamp-violet) 10%, transparent);
    --blue-veil: color-mix(in srgb, var(--gst-ruled-blue) 9%, transparent);
    --audit-veil: color-mix(in srgb, var(--marigold-audit) 16%, transparent);
    --red-veil: color-mix(in srgb, var(--entry-red) 10%, transparent);
    --shadow-large: 0 34px 90px color-mix(in srgb, var(--ledger-ink) 18%, transparent);
    --font-display: "Libre Baskerville", Georgia, ui-serif, serif;
    --font-body: "Source Sans 3", "Segoe UI", ui-sans-serif, system-ui, sans-serif;
    --font-utility: "Azeret Mono", "Cascadia Code", ui-monospace, monospace;
    --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
  }

  * {
    box-sizing: border-box;
  }

  html {
    min-width: 320px;
    background: var(--passbook-paper);
  }

  body {
    margin: 0;
    min-height: 100vh;
    color: var(--ledger-ink);
    background:
      linear-gradient(90deg, color-mix(in srgb, var(--gst-ruled-blue) 7%, transparent) 1px, transparent 1px) 0 0 / 84px 84px,
      linear-gradient(0deg, color-mix(in srgb, var(--gst-ruled-blue) 6%, transparent) 1px, transparent 1px) 0 0 / 100% 42px,
      linear-gradient(180deg, color-mix(in srgb, white 62%, transparent), transparent 52vh),
      var(--passbook-paper);
    font-family: var(--font-body);
    font-size: 16px;
    line-height: 1.5;
    text-rendering: geometricPrecision;
    overflow-x: hidden;
  }

  button,
  select,
  input {
    font: inherit;
  }

  button,
  a,
  select {
    min-height: 44px;
  }

  button {
    color: inherit;
    cursor: pointer;
  }

  a {
    color: inherit;
    text-decoration: none;
  }

  code,
  .mono {
    font-family: var(--font-utility);
    font-size: 0.84rem;
  }

  code {
    display: inline-block;
    max-width: 100%;
    padding: 1px 6px;
    border: 1px solid var(--line);
    border-radius: 5px;
    background: color-mix(in srgb, white 34%, transparent);
    overflow-wrap: anywhere;
  }

  .app-canvas {
    min-height: 100vh;
  }

  .top-index {
    position: sticky;
    top: 0;
    z-index: 50;
    display: grid;
    grid-template-columns: minmax(220px, 1fr) minmax(360px, 560px) minmax(250px, 330px);
    gap: 22px;
    align-items: center;
    padding: 18px clamp(18px, 4vw, 54px);
    border-bottom: 1px solid var(--line);
    background: color-mix(in srgb, var(--passbook-paper) 68%, transparent);
    -webkit-backdrop-filter: blur(22px);
    backdrop-filter: blur(22px);
  }

  .brand {
    display: grid;
    grid-template-columns: 44px minmax(0, 1fr);
    gap: 12px;
    align-items: center;
    min-width: 0;
  }

  .brand-mark {
    display: grid;
    place-items: center;
    width: 44px;
    height: 44px;
    border-radius: 7px;
    background: var(--ledger-ink);
    color: var(--passbook-paper);
    font-family: var(--font-display);
    font-weight: 700;
  }

  .brand h1,
  .stage-title,
  .drawer-title,
  .section-title,
  .stamp-letter {
    margin: 0;
    font-family: var(--font-display);
    letter-spacing: 0;
  }

  .brand h1 {
    font-size: 1.22rem;
    line-height: 1.15;
  }

  .brand p,
  .muted,
  .fine-print {
    margin: 0;
    color: var(--ink-muted);
  }

  .status-line {
    display: flex;
    flex-wrap: wrap;
    gap: 8px 12px;
    margin-top: 6px;
    color: var(--ink-muted);
    font-family: var(--font-utility);
    font-size: 0.72rem;
  }

  .status-line span + span::before {
    content: "/";
    margin-right: 12px;
    color: var(--line-strong);
  }

  .status-line [data-state="live"] {
    color: var(--stamp-violet);
  }

  .status-line [data-state="offline"] {
    color: var(--entry-red);
  }

  .nav-index {
    display: grid;
    grid-template-columns: repeat(5, minmax(0, 1fr));
    align-items: center;
    border-bottom: 1px solid var(--line);
  }

  .nav-index button {
    min-width: 0;
    border: 0;
    border-bottom: 3px solid transparent;
    background: transparent;
    font-weight: 800;
  }

  .nav-index button:hover,
  .nav-index button:focus-visible {
    color: var(--gst-ruled-blue);
    outline: 0;
  }

  .nav-index button[aria-selected="true"] {
    color: var(--stamp-violet);
    border-bottom-color: var(--stamp-violet);
  }

  .case-picker {
    display: grid;
    grid-template-columns: minmax(0, 1fr);
    gap: 8px;
  }

  .case-picker label {
    color: var(--ink-muted);
    font-size: 0.88rem;
  }

  .case-select {
    width: 100%;
    min-width: 0;
    padding: 0 12px;
    border: 1px solid var(--line-strong);
    border-radius: 7px;
    background: color-mix(in srgb, var(--passbook-paper) 78%, transparent);
    color: var(--ledger-ink);
  }

  .file-index {
    display: grid;
    gap: 10px;
    padding: 14px clamp(18px, 4vw, 54px) 0;
  }

  .case-list {
    display: flex;
    gap: 18px;
    overflow-x: auto;
    padding-bottom: 8px;
  }

  .case-button {
    flex: 0 0 auto;
    min-width: min(292px, 78vw);
    display: grid;
    gap: 2px;
    padding: 6px 0 10px;
    border: 0;
    border-bottom: 2px solid var(--line);
    background: transparent;
    text-align: left;
  }

  .case-button strong {
    overflow-wrap: anywhere;
  }

  .case-button span {
    color: var(--ink-muted);
    font-size: 0.92rem;
  }

  .case-button:hover,
  .case-button:focus-visible {
    color: var(--gst-ruled-blue);
    outline: 0;
  }

  .case-button[aria-pressed="true"] {
    border-bottom-color: var(--stamp-violet);
    color: var(--stamp-violet);
  }

  .stage-shell {
    display: grid;
    gap: 28px;
    max-width: 1280px;
    margin: 0 auto;
    padding: clamp(28px, 6vw, 76px) clamp(18px, 4vw, 54px) 70px;
  }

  .decision-stage {
    display: grid;
    grid-template-columns: minmax(0, 1.05fr) minmax(280px, 0.95fr);
    gap: clamp(26px, 5vw, 72px);
    align-items: center;
    min-height: min(650px, calc(100vh - 190px));
  }

  .stage-copy {
    min-width: 0;
  }

  .stage-file {
    display: inline-grid;
    grid-auto-flow: column;
    gap: 12px;
    align-items: center;
    margin-bottom: 24px;
    color: var(--ink-muted);
  }

  .stage-file span {
    padding-bottom: 3px;
    border-bottom: 1px solid var(--line-strong);
  }

  .stage-title {
    max-width: 850px;
    font-size: 5.15rem;
    line-height: 0.98;
  }

  .stage-lede {
    max-width: 690px;
    margin: 28px 0 0;
    color: var(--ink-muted);
    font-size: 1.18rem;
  }

  .stage-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin-top: 30px;
  }

  .primary-action,
  .quiet-action,
  .drawer-close {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    min-width: 132px;
    padding: 0 16px;
    border-radius: 999px;
    font-weight: 800;
  }

  .primary-action {
    border: 1px solid var(--ledger-ink);
    background: var(--ledger-ink);
    color: var(--passbook-paper);
  }

  .quiet-action,
  .drawer-close {
    border: 1px solid var(--line-strong);
    background: color-mix(in srgb, var(--passbook-paper) 54%, transparent);
  }

  .primary-action:hover,
  .primary-action:focus-visible,
  .quiet-action:hover,
  .quiet-action:focus-visible,
  .drawer-close:hover,
  .drawer-close:focus-visible {
    transform: translateY(-1px);
    outline: 0;
  }

  .verdict-stage {
    position: relative;
    min-width: 0;
    padding: clamp(24px, 4vw, 44px);
    border: 1px solid var(--line-strong);
    border-radius: 28px;
    background: color-mix(in srgb, var(--passbook-paper) 50%, transparent);
    -webkit-backdrop-filter: blur(22px);
    backdrop-filter: blur(22px);
    box-shadow: var(--shadow-large);
    overflow: hidden;
  }

  .verdict-stage::before {
    content: "";
    position: absolute;
    inset: 18px;
    border: 2px double color-mix(in srgb, var(--stamp-violet) 74%, transparent);
    border-radius: 22px;
    pointer-events: none;
    transform: rotate(-0.4deg);
  }

  .stamp-note {
    position: relative;
    display: grid;
    gap: 24px;
  }

  .risk-mark {
    width: max-content;
    min-height: 32px;
    display: inline-flex;
    align-items: center;
    padding: 4px 11px;
    border: 1px solid var(--stamp-violet);
    border-radius: 999px;
    color: var(--stamp-violet);
    font-weight: 800;
  }

  .stamp-letter {
    color: var(--stamp-violet);
    font-size: 7.6rem;
    line-height: 0.82;
  }

  .stamp-score {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: 18px;
    align-items: end;
    padding-bottom: 18px;
    border-bottom: 1px solid color-mix(in srgb, var(--stamp-violet) 34%, transparent);
  }

  .stamp-score strong {
    color: var(--stamp-violet);
    font-family: var(--font-utility);
    font-size: 1.2rem;
  }

  .limit-number {
    color: var(--gst-ruled-blue);
    font-family: var(--font-utility);
    font-size: 2.4rem;
    font-weight: 800;
  }

  .decision-line {
    display: grid;
    gap: 12px;
  }

  .decision-line div {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: 14px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--line);
  }

  .decision-line span {
    color: var(--ink-muted);
  }

  .decision-word {
    font-family: var(--font-display);
    font-size: 1.4rem;
  }

  .decision-word.approved {
    color: var(--stamp-violet);
  }

  .decision-word.rejected,
  .entry-red {
    color: var(--entry-red);
  }

  .source-glance {
    grid-column: 1 / -1;
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 0;
    border-top: 1px solid var(--line-strong);
    border-bottom: 1px solid var(--line-strong);
    background: color-mix(in srgb, var(--passbook-paper) 42%, transparent);
    -webkit-backdrop-filter: blur(18px);
    backdrop-filter: blur(18px);
  }

  .source-glance div {
    min-width: 0;
    padding: 18px;
    border-right: 1px solid var(--line);
  }

  .source-glance div:last-child {
    border-right: 0;
  }

  .source-glance span {
    display: block;
    color: var(--ink-muted);
  }

  .source-glance strong {
    display: block;
    margin-top: 4px;
    overflow-wrap: anywhere;
  }

  .portfolio-ribbon {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
  }

  .impact-item {
    min-width: 0;
    padding: 20px 22px;
    border-right: 1px solid var(--line);
  }

  .impact-item:last-child {
    border-right: 0;
  }

  .impact-item span {
    color: var(--ink-muted);
  }

  .impact-item strong {
    display: block;
    margin: 5px 0;
    color: var(--gst-ruled-blue);
    font-family: var(--font-utility);
    font-size: 1.45rem;
    overflow-wrap: anywhere;
  }

  .scrim {
    position: fixed;
    inset: 0;
    z-index: 30;
    background: color-mix(in srgb, var(--ledger-ink) 12%, transparent);
    opacity: 0;
    pointer-events: none;
    transition: opacity 240ms var(--ease-out);
  }

  body.drawer-open .scrim {
    opacity: 1;
    pointer-events: none;
  }

  .review-drawer {
    position: fixed;
    z-index: 40;
    top: 154px;
    right: 24px;
    width: min(560px, calc(100vw - 48px));
    height: calc(100vh - 170px);
    display: grid;
    grid-template-rows: auto auto minmax(0, 1fr);
    border: 1px solid var(--line-strong);
    border-radius: 28px;
    background: color-mix(in srgb, var(--passbook-paper) 90%, white 6%);
    -webkit-backdrop-filter: blur(28px);
    backdrop-filter: blur(28px);
    box-shadow: var(--shadow-large);
    transform: translateX(calc(100% + 28px));
    opacity: 0;
    transition: transform 360ms var(--ease-out), opacity 240ms var(--ease-out);
    overflow: hidden;
  }

  body.drawer-open .review-drawer {
    transform: translateX(0);
    opacity: 1;
  }

  .drawer-head {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: 16px;
    align-items: center;
    padding: 24px 24px 16px;
    border-bottom: 1px solid var(--line);
    background: color-mix(in srgb, var(--passbook-paper) 92%, white 4%);
  }

  .drawer-title {
    font-size: 1.35rem;
  }

  .drawer-stamp {
    display: grid;
    grid-template-columns: auto minmax(0, 1fr);
    gap: 16px;
    align-items: center;
    padding: 18px 24px;
    border-bottom: 1px solid var(--line);
    background: color-mix(in srgb, var(--passbook-paper) 86%, var(--stamp-violet) 8%);
  }

  .drawer-stamp .stamp-letter {
    font-size: 4rem;
  }

  .stamp-ledger {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 8px 18px;
  }

  .stamp-ledger div {
    display: grid;
    gap: 1px;
  }

  .stamp-ledger span {
    color: var(--ink-muted);
  }

  .stamp-ledger strong {
    font-family: var(--font-utility);
  }

  .drawer-body {
    min-height: 0;
    overflow: auto;
    padding: 24px;
    background: color-mix(in srgb, var(--passbook-paper) 92%, white 4%);
  }

  .drawer-launch {
    position: fixed;
    right: 22px;
    bottom: 22px;
    z-index: 25;
    min-width: 164px;
    border: 1px solid var(--ledger-ink);
    border-radius: 999px;
    background: color-mix(in srgb, var(--ledger-ink) 92%, transparent);
    color: var(--passbook-paper);
    box-shadow: 0 18px 44px color-mix(in srgb, var(--ledger-ink) 20%, transparent);
    font-weight: 800;
  }

  body.drawer-open .drawer-launch {
    opacity: 0;
    pointer-events: none;
  }

  .detail-grid,
  .detail-grid-3,
  .memo-grid {
    display: grid;
    gap: 16px;
  }

  .detail-grid,
  .memo-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .detail-grid-3 {
    grid-template-columns: repeat(3, minmax(0, 1fr));
  }

  .detail-section {
    min-width: 0;
    display: grid;
    gap: 14px;
    padding-bottom: 18px;
    border-bottom: 1px solid var(--line);
  }

  .detail-section + .detail-section,
  .spaced {
    margin-top: 22px;
  }

  .section-title {
    font-size: 1.08rem;
  }

  .ledger-table {
    width: 100%;
    border-collapse: collapse;
  }

  .ledger-table td,
  .ledger-table th {
    padding: 10px 0;
    border-bottom: 1px solid var(--line);
    text-align: left;
    vertical-align: top;
  }

  .ledger-table th {
    color: var(--ink-muted);
    font-weight: 700;
  }

  .ledger-table td:last-child,
  .ledger-table th:last-child {
    text-align: right;
  }

  .ledger-table tr:last-child td {
    border-bottom: 0;
  }

  .meter-list,
  .journal-list,
  .reason-list {
    display: grid;
    gap: 12px;
  }

  .meter-list {
    padding-right: 32px;
  }

  .meter-row {
    display: grid;
    gap: 7px;
  }

  .meter-head {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: 12px;
  }

  .meter-head strong,
  .number {
    font-family: var(--font-utility);
  }

  .score-rule {
    height: 9px;
    border: 1px solid var(--line);
    border-radius: 999px;
    background: color-mix(in srgb, white 40%, transparent);
    overflow: hidden;
  }

  .score-rule span {
    display: block;
    width: var(--value);
    height: 100%;
    background: linear-gradient(90deg, var(--gst-ruled-blue), var(--stamp-violet));
  }

  .journal-row,
  .reason-row {
    display: grid;
    gap: 4px;
    padding: 13px 0;
    border-bottom: 1px solid var(--line);
  }

  .journal-row:last-child,
  .reason-row:last-child {
    border-bottom: 0;
  }

  .journal-state {
    color: var(--gst-ruled-blue);
    font-family: var(--font-utility);
    font-size: 0.82rem;
  }

  .truth-note {
    padding: 13px 14px;
    border: 1px solid color-mix(in srgb, var(--marigold-audit) 40%, transparent);
    border-radius: 12px;
    background: var(--audit-veil);
  }

  .empty-state,
  .error-state,
  .skeleton {
    min-height: 118px;
    display: grid;
    place-items: center;
    padding: 24px;
    border: 1px dashed var(--line-strong);
    border-radius: 18px;
    background: color-mix(in srgb, var(--passbook-paper) 46%, transparent);
    color: var(--ink-muted);
    text-align: center;
  }

  .error-state {
    border-color: color-mix(in srgb, var(--entry-red) 50%, transparent);
    background: var(--red-veil);
    color: var(--entry-red);
  }

  @media (prefers-reduced-motion: reduce) {
    *,
    *::before,
    *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      scroll-behavior: auto !important;
      transition-duration: 0.01ms !important;
    }
  }

  @media (max-width: 1120px) {
    .top-index {
      grid-template-columns: 1fr;
      gap: 14px;
    }

    .decision-stage {
      grid-template-columns: 1fr;
      min-height: 0;
    }

    .stage-title {
      max-width: 820px;
      font-size: 4.6rem;
    }

    .source-glance,
    .portfolio-ribbon {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .source-glance div:nth-child(2),
    .impact-item:nth-child(2) {
      border-right: 0;
    }

    .source-glance div:nth-child(-n + 2),
    .impact-item:nth-child(-n + 2) {
      border-bottom: 1px solid var(--line);
    }
  }

  @media (max-width: 760px) {
    body {
      font-size: 15px;
    }

    .top-index {
      padding: 14px 16px;
    }

    .nav-index {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .file-index {
      padding: 12px 16px 0;
    }

    .stage-shell {
      padding: 26px 16px 96px;
    }

    .stage-title {
      font-size: 2.8rem;
    }

    .stamp-letter {
      font-size: 5.2rem;
    }

    .limit-number {
      font-size: 1.65rem;
    }

    .stage-lede {
      font-size: 1.04rem;
    }

    .verdict-stage {
      border-radius: 22px;
      padding: 22px;
    }

    .decision-line div,
    .stamp-score,
    .stamp-ledger,
    .detail-grid,
    .detail-grid-3,
    .memo-grid,
    .source-glance,
    .portfolio-ribbon {
      grid-template-columns: 1fr;
    }

    .decision-line div,
    .stamp-score {
      align-items: start;
    }

    .source-glance div,
    .impact-item {
      border-right: 0;
      border-bottom: 1px solid var(--line);
    }

    .source-glance div:last-child,
    .impact-item:last-child {
      border-bottom: 0;
    }

    .review-drawer {
      top: auto;
      right: 8px;
      bottom: 8px;
      left: 8px;
      width: auto;
      height: min(78vh, 760px);
      border-radius: 24px;
      transform: translateY(calc(100% + 18px));
    }

    body.drawer-open .review-drawer {
      transform: translateY(0);
    }

    body.drawer-open .scrim {
      pointer-events: auto;
    }

    .drawer-head,
    .drawer-stamp,
    .drawer-body {
      padding-left: 18px;
      padding-right: 18px;
    }

    .drawer-stamp {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>
<body>
  <div class="app-canvas">
    <header class="top-index">
      <a class="brand" href="#mainStage" aria-label="UdyamPulse home">
        <span class="brand-mark" aria-hidden="true">Up</span>
        <span>
          <h1>UdyamPulse</h1>
          <p>MSME credit review, without hiding the audit trail.</p>
          <span class="status-line" aria-label="System status">
            <span id="apiStatus" data-state="checking">Checking API</span>
            <span id="modelStatus">linear</span>
            <span id="cohortStatus">public synthetic</span>
          </span>
        </span>
      </a>

      <nav id="tabs" class="nav-index" role="tablist" aria-label="Review packet index">
        <button type="button" role="tab" data-tab="decision" aria-selected="true">Decision</button>
        <button type="button" role="tab" data-tab="evidence" aria-selected="false">Evidence</button>
        <button type="button" role="tab" data-tab="governance" aria-selected="false">Governance</button>
        <button type="button" role="tab" data-tab="proof" aria-selected="false">Proof</button>
        <button type="button" role="tab" data-tab="sources" aria-selected="false">Sources</button>
      </nav>

      <div class="case-picker">
        <label for="msme">Borrower file</label>
        <select id="msme" class="case-select" aria-label="Select MSME borrower">
          <option>Loading borrower files...</option>
        </select>
      </div>
    </header>

    <section class="file-index" aria-label="Borrower file index">
      <div id="caseList" class="case-list">
        <div class="skeleton">Loading cases...</div>
      </div>
    </section>

    <main id="mainStage" class="stage-shell">
      <section id="caseSummary" class="decision-stage" aria-live="polite">
        <div class="skeleton">Loading borrower assessment...</div>
      </section>

      <section id="portfolioMetrics" class="portfolio-ribbon" aria-label="Portfolio impact"></section>
    </main>

    <button id="drawerToggle" class="drawer-launch" type="button">Review packet</button>
    <div id="drawerScrim" class="scrim" aria-hidden="true"></div>

    <aside id="reviewDrawer" class="review-drawer" aria-label="Sliding review packet" aria-hidden="true">
      <div class="drawer-head">
        <div>
          <h2 id="drawerTitle" class="drawer-title">Decision packet</h2>
          <p class="muted">Focused detail for the selected index item.</p>
        </div>
        <button id="drawerClose" class="drawer-close" type="button">Close</button>
      </div>
      <section id="decisionStamp" class="drawer-stamp" aria-label="Decision summary">
        <div class="skeleton">Loading decision stamp...</div>
      </section>
      <div id="tabContent" class="drawer-body" role="tabpanel">
        <div class="skeleton">Preparing review packet...</div>
      </div>
    </aside>
  </div>

  <script>
    const API_BASE = window.location.protocol === "file:" ? "http://localhost:8000" : "";
    const state = {
      health: null,
      msmes: [],
      portfolio: null,
      governance: null,
      validation: null,
      model: null,
      submissionProof: null,
      activeId: "ntc_hero",
      activeScore: null,
      activeTab: "decision",
      drawerOpen: false,
    };

    const els = {
      apiStatus: document.getElementById("apiStatus"),
      modelStatus: document.getElementById("modelStatus"),
      cohortStatus: document.getElementById("cohortStatus"),
      msme: document.getElementById("msme"),
      caseList: document.getElementById("caseList"),
      caseSummary: document.getElementById("caseSummary"),
      decisionStamp: document.getElementById("decisionStamp"),
      portfolioMetrics: document.getElementById("portfolioMetrics"),
      tabs: document.getElementById("tabs"),
      tabContent: document.getElementById("tabContent"),
      drawer: document.getElementById("reviewDrawer"),
      drawerTitle: document.getElementById("drawerTitle"),
      drawerToggle: document.getElementById("drawerToggle"),
      drawerClose: document.getElementById("drawerClose"),
      drawerScrim: document.getElementById("drawerScrim"),
    };

    const currency = new Intl.NumberFormat("en-IN", {
      style: "currency",
      currency: "INR",
      maximumFractionDigits: 0,
    });

    const drawerTitles = {
      decision: "Decision packet",
      evidence: "Evidence packet",
      governance: "Governance packet",
      proof: "Judge proof",
      sources: "Source register",
    };

    function esc(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function formatCurrency(value) {
      return currency.format(Number(value || 0));
    }

    function titleize(value) {
      return String(value ?? "-")
        .replace(/_/g, " ")
        .replace(/\b\w/g, (char) => char.toUpperCase());
    }

    function code(value) {
      return `<code>${esc(value)}</code>`;
    }

    function riskMark(label) {
      return `<span class="risk-mark">${esc(label || "Review risk")}</span>`;
    }

    function statusClass(value) {
      const text = String(value || "").toLowerCase();
      if (/(reject|decline|missing|fail|offline|high|thin)/.test(text)) return "entry-red";
      if (/(approved|pass|live|connected|ready|low|stable)/.test(text)) return "approved";
      return "";
    }

    async function api(path) {
      const response = await fetch(`${API_BASE}${path}`);
      if (!response.ok) throw new Error(`${path} returned ${response.status}`);
      return response.json();
    }

    function setDrawerOpen(open) {
      state.drawerOpen = open;
      document.body.classList.toggle("drawer-open", open);
      els.drawer.setAttribute("aria-hidden", String(!open));
    }

    function setApiStatus(ok, label) {
      els.apiStatus.textContent = label;
      els.apiStatus.dataset.state = ok ? "live" : "offline";
    }

    function setModelStatusText() {
      const runtime = state.model || state.governance?.model?.runtime || {};
      return runtime.active_provider || "linear";
    }

    function updateStatusLine() {
      els.modelStatus.textContent = `${setModelStatusText()} model`;
      els.cohortStatus.textContent = state.portfolio?.cohort_label || "public synthetic";
    }

    function miniLedger(items) {
      return `<table class="ledger-table"><tbody>${items.map(([label, value]) => `
        <tr><td>${esc(label)}</td><td class="number">${esc(value)}</td></tr>
      `).join("")}</tbody></table>`;
    }

    function renderPortfolioMetrics() {
      const summary = state.portfolio?.summary;
      if (!summary) {
        els.portfolioMetrics.innerHTML = `<div class="empty-state">Portfolio impact unavailable.</div>`;
        return;
      }
      const pilot = state.portfolio?.pilot_metrics;
      const items = [
        ["NTC rescues", summary.ntc_rescues, "thin-file files approved with alternate data"],
        ["Credit unlocked", formatCurrency(summary.credit_unlocked), "public demo cohort"],
        ["Approval lift", pilot ? `+${pilot.ntc_ntb_approval_lift_pct}%` : `+${summary.alternate_data_approvals - summary.traditional_approvals}`, "not a bank benchmark"],
        ["Decision time", pilot ? `${pilot.decision_time_reduction_pct}% saved` : `${summary.decision_time_minutes} min`, `from ${summary.manual_baseline_days} day manual baseline`],
      ];
      els.portfolioMetrics.innerHTML = items.map(([label, value, detail]) => `
        <article class="impact-item">
          <span>${esc(label)}</span>
          <strong>${esc(value)}</strong>
          <p class="fine-print">${esc(detail)}</p>
        </article>
      `).join("");
    }

    function renderCases() {
      els.msme.innerHTML = state.msmes.map((item) => `
        <option value="${esc(item.id)}">${esc(item.name)}</option>
      `).join("");
      els.msme.value = state.activeId;

      const cases = state.portfolio?.cases || [];
      els.caseList.innerHTML = cases.map((item) => `
        <button class="case-button" type="button" data-case="${esc(item.id)}" aria-pressed="${item.id === state.activeId}">
          <strong>${esc(item.name)}</strong>
          <span>${esc(item.sector)} / ${esc(item.district)}</span>
          <span class="mono">${esc(item.grade)} grade / ${formatCurrency(item.eligible_limit)}</span>
        </button>
      `).join("");
    }

    function sourceByName(score, name) {
      return (score.data_sources || []).find((source) => source.source === name)?.signal || "Source signal ready";
    }

    function renderSourceGlance(score) {
      const sources = [
        ["AA cash flow", sourceByName(score, "Account Aggregator")],
        ["GST discipline", sourceByName(score, "GST")],
        ["UPI velocity", sourceByName(score, "UPI")],
        ["EPFO footprint", sourceByName(score, "EPFO")],
      ];
      return `<div class="source-glance">${sources.map(([label, value]) => `
        <div><span>${esc(label)}</span><strong>${esc(value)}</strong></div>
      `).join("")}</div>`;
    }

    function renderCaseSummary(score) {
      if (!score) {
        els.caseSummary.innerHTML = `<div class="skeleton">Select a borrower file.</div>`;
        return;
      }
      const profile = score.profile || {};
      const fileId = state.activeId.replace(/_/g, "-");
      const traditionalClass = score.traditional.decision === "Approved" ? "approved" : "rejected";
      const alternateClass = score.alternate_data_decision === "Approved" ? "approved" : "rejected";
      const ntcLabel = profile.has_bureau_history ? "Bureau history present" : "New-to-Credit / New-to-Bank";
      const title = score.traditional.decision === "Rejected"
        ? "Bureau rejection reversed."
        : "Governed credit decision ready.";

      els.caseSummary.innerHTML = `
        <div class="stage-copy">
          <div class="stage-file">
            <span class="mono">UP-${esc(fileId)}</span>
            <span>${esc(profile.sector || "MSME")} / ${esc(profile.district || "India")}</span>
            <span>${esc(ntcLabel)}</span>
          </div>
          <h2 class="stage-title">${esc(title)}</h2>
          <p class="stage-lede">${esc(score.name)} is ${esc(score.alternate_data_decision.toLowerCase())} for ${formatCurrency(score.eligible_limit)} after consented cash-flow, GST, UPI, EPFO-style, and bureau signals are reviewed. Detailed reasons, fairness checks, proof, and sandbox boundaries live in the sliding review packet.</p>
          <div class="stage-actions">
            <button class="primary-action" type="button" data-open-tab="decision">Open decision packet</button>
            <button class="quiet-action" type="button" data-open-tab="sources">View source map</button>
          </div>
        </div>
        <aside class="verdict-stage" aria-label="Decision stage">
          <div class="stamp-note">
            ${riskMark(score.risk_band)}
            <div class="stamp-score">
              <span class="stamp-letter">${esc(score.grade)}</span>
              <strong>${esc(score.score)}/100</strong>
            </div>
            <div>
              <p class="muted">Eligible limit</p>
              <div class="limit-number">${formatCurrency(score.eligible_limit)}</div>
            </div>
            <div class="decision-line">
              <div><span>Traditional bureau screen</span><strong class="decision-word ${traditionalClass}">${esc(score.traditional.decision)}</strong></div>
              <div><span>UdyamPulse alternate-data review</span><strong class="decision-word ${alternateClass}">${esc(score.alternate_data_decision)}</strong></div>
              <div><span>Runtime</span><strong class="mono">${esc(setModelStatusText())} / synthetic demo</strong></div>
            </div>
          </div>
        </aside>
        ${renderSourceGlance(score)}
      `;

      els.caseSummary.querySelectorAll("[data-open-tab]").forEach((button) => {
        button.addEventListener("click", () => setTab(button.dataset.openTab, true));
      });
    }

    function renderDecisionStamp(score) {
      const validation = state.validation?.metrics;
      const governance = state.governance;
      if (!score) {
        els.decisionStamp.innerHTML = `<div class="skeleton">Decision summary unavailable.</div>`;
        return;
      }
      els.decisionStamp.innerHTML = `
        <span class="stamp-letter">${esc(score.grade)}</span>
        <div class="stamp-ledger">
          <div><span>Score</span><strong>${esc(score.score)}/100</strong></div>
          <div><span>Risk</span><strong>${esc(score.risk_band)}</strong></div>
          <div><span>Limit</span><strong>${formatCurrency(score.eligible_limit)}</strong></div>
          <div><span>Model</span><strong>${esc(setModelStatusText())}</strong></div>
          <div><span>Audit</span><strong>${esc(governance?.audit?.events_recorded ?? "-")} events</strong></div>
          <div><span>OOT AUC</span><strong>${esc(validation?.auc ?? "-")}</strong></div>
        </div>
      `;
    }

    function renderPillars(score) {
      return Object.entries(score.pillars || {}).map(([key, value]) => {
        const width = Math.max(0, Math.min(100, Number(value) * 5));
        return `
          <div class="meter-row">
            <div class="meter-head"><span>${esc(titleize(key))}</span><strong>${esc(value)}/20</strong></div>
            <div class="score-rule" aria-hidden="true"><span style="--value: ${width}%;"></span></div>
          </div>
        `;
      }).join("");
    }

    function renderReasons(reasons = []) {
      return reasons.map((reason) => `
        <article class="reason-row">
          <strong>${esc(reason)}</strong>
        </article>
      `).join("") || `<div class="empty-state">No reason codes available.</div>`;
    }

    function itemTitle(item) {
      return item.control || item.stage || item.source || item.layer || item.step || item.title || item.criterion || item.common_pattern || "Review item";
    }

    function itemDetail(item) {
      return item.detail || item.evidence || item.signal || item.proves || item.expected || item.implemented || item.udyampulse_advantage || item.proof || "";
    }

    function renderJournal(items = [], emptyLabel = "No rows available.") {
      return items.map((item) => {
        const stateText = item.status || item.decision || item.method || item.endpoint || item.category || "Review";
        return `
          <article class="journal-row">
            <span class="journal-state ${statusClass(stateText)}">${esc(stateText)}</span>
            <strong>${esc(itemTitle(item))}</strong>
            <p class="muted">${esc(itemDetail(item))}</p>
          </article>
        `;
      }).join("") || `<div class="empty-state">${esc(emptyLabel)}</div>`;
    }

    function renderFairnessRows(rows = []) {
      return `<table class="ledger-table"><tbody>${rows.map((row) => `
        <tr><td>${esc(row.group)} (${esc(row.count)})</td><td class="number">${esc(row.alternate_approval_rate)}%</td></tr>
      `).join("") || `<tr><td>No rows</td><td class="number">-</td></tr>`}</tbody></table>`;
    }

    function renderDecisionTab(score) {
      const improvement = score.improvement_plan;
      const improvementText = improvement
        ? `${improvement.action} Potential grade: ${improvement.potential_grade}; limit uplift: ${formatCurrency(improvement.limit_increase)}.`
        : "Maintain GST filing continuity, low bounce rate, and broad digital counterparties to preserve the current fast-track grade.";
      return `
        <section class="detail-section">
          <h3 class="section-title">Five-pillar health ledger</h3>
          <div class="meter-list">${renderPillars(score)}</div>
        </section>
        <section class="detail-section">
          <h3 class="section-title">Reason-code journal</h3>
          <div class="reason-list">${renderReasons(score.reasons)}</div>
        </section>
        <section class="detail-section">
          <h3 class="section-title">Underwriter memo</h3>
          <p>${esc(score.memo)}</p>
        </section>
        <section class="detail-section">
          <h3 class="section-title">Borrower improvement note</h3>
          <p>${esc(improvementText)}</p>
        </section>
      `;
    }

    function renderEvidenceTab(score) {
      return `
        <section class="detail-section">
          <h3 class="section-title">Model attribution</h3>
          <p class="muted">Baseline ${esc(score.ml?.baseline_score)} with exact linear Shapley-equivalent contributions in the public model.</p>
          <div class="reason-list spaced">${renderReasons(score.ml?.top_reasons || [])}</div>
        </section>
        <section class="detail-section">
          <h3 class="section-title">Decision path</h3>
          <div class="journal-list">${renderJournal(score.decision_path, "No decision path rows available.")}</div>
        </section>
        <section class="detail-section">
          <h3 class="section-title">Policy guardrails</h3>
          <div class="journal-list">${renderJournal(score.policy_guardrails, "No guardrail rows available.")}</div>
        </section>
      `;
    }

    function renderGovernanceTab() {
      const governance = state.governance;
      const validation = state.validation?.metrics;
      const warnings = state.validation?.warnings || [];
      const pilot = governance?.pilot_metrics || state.portfolio?.pilot_metrics;
      const fairness = governance?.fairness || {};
      const runtime = governance?.model?.runtime || {};
      if (!governance) return `<div class="empty-state">Governance data is not loaded yet.</div>`;

      return `
        <section class="detail-section">
          <h3 class="section-title">Model and audit</h3>
          ${miniLedger([
            ["Audit events", governance.audit.events_recorded],
            ["Model version", governance.model.version],
            ["Active model", runtime.active_provider || "linear"],
          ])}
        </section>
        <section class="detail-section">
          <h3 class="section-title">Out-of-time validation</h3>
          ${validation ? miniLedger([
            ["AUC", validation.auc],
            ["Gini", validation.gini],
            ["KS", validation.ks],
            ["PSI drift", validation.psi],
            ["Reason stability", validation.reason_code_stability],
          ]) : `<div class="empty-state">No validation report.</div>`}
          ${warnings.length ? `<p class="truth-note">${esc(warnings[0])}</p>` : ""}
        </section>
        <section class="detail-section">
          <h3 class="section-title">Pilot KPI targets</h3>
          ${pilot ? miniLedger([
            ["NTC/NTB lift", `+${pilot.ntc_ntb_approval_lift_pct}%`],
            ["Decision time", `${pilot.decision_time_reduction_pct}% saved`],
            ["Approved sectors", pilot.portfolio_diversification.approved_sector_count],
            ["Approved districts", pilot.portfolio_diversification.approved_district_count],
          ]) : `<div class="empty-state">No pilot KPI rows.</div>`}
        </section>
        <section class="detail-section">
          <h3 class="section-title">Live controls</h3>
          <div class="journal-list">${renderJournal(governance.controls, "No control rows available.")}</div>
        </section>
        <section class="detail-section">
          <h3 class="section-title">Fairness gap checks</h3>
          <p class="muted">${esc(fairness.note || "Public cohort check only; production pilot requires outcome-linked monitoring.")}</p>
          <h3 class="section-title spaced">Bureau history</h3>
          ${renderFairnessRows(fairness.by_bureau_history)}
          <h3 class="section-title spaced">Sector</h3>
          ${renderFairnessRows(fairness.by_sector)}
          <h3 class="section-title spaced">Geography</h3>
          ${renderFairnessRows(fairness.by_geography)}
        </section>
      `;
    }

    function evidenceCodes(items = []) {
      return items.map((item) => code(item)).join(" ");
    }

    function renderProofTab() {
      const proof = state.submissionProof;
      if (!proof) return `<div class="empty-state">Submission proof is not loaded yet.</div>`;
      const hero = proof.hero_reversal || {};
      const truth = proof.truth_boundary || {};
      const rubric = proof.rubric_scorecard || [];
      const gaps = proof.competitor_gap_map || [];
      const runbook = proof.judge_runbook || [];
      const capabilities = proof.backend_capabilities || [];
      const apis = proof.api_catalog || [];

      return `
        <section class="detail-section">
          <h3 class="section-title">Judge proof</h3>
          ${miniLedger([
            ["Proof API", proof.status || "Live"],
            ["Hero case", hero.case || "-"],
            ["Traditional", hero.traditional_decision || "-"],
            ["UdyamPulse", hero.alternate_data_decision || "-"],
            ["Grade", `${hero.grade || "-"} / ${hero.score ?? "-"} score`],
          ])}
        </section>
        <section class="detail-section">
          <h3 class="section-title">Truth boundary</h3>
          ${miniLedger([
            ["Public data", truth.public_data ? "Synthetic demo cohort" : "-"],
            ["Private IDBI data", truth.private_idbi_data === "not_claimed" ? "Not claimed" : titleize(truth.private_idbi_data)],
            ["Sandbox access", truth.sandbox_access ? "Post-shortlisting" : "-"],
            ["Production model", truth.production_model ? "Optional Stage 2 GBM/SHAP" : "-"],
          ])}
        </section>
        <section class="detail-section">
          <h3 class="section-title">Rubric scorecard</h3>
          <div class="journal-list">
            ${rubric.map((item) => `
              <article class="journal-row">
                <span class="journal-state">${esc(item.criterion || "Rubric")}</span>
                <strong>${esc(item.proof)}</strong>
                <p class="muted">${evidenceCodes(item.evidence)}</p>
              </article>
            `).join("")}
          </div>
        </section>
        <section class="detail-section">
          <h3 class="section-title">Competitor gap map</h3>
          <div class="journal-list">${renderJournal(gaps, "No competitor gap rows.")}</div>
        </section>
        <section class="detail-section">
          <h3 class="section-title">Judge runbook</h3>
          <div class="journal-list">${renderJournal(runbook, "No runbook rows.")}</div>
        </section>
        <section class="detail-section">
          <h3 class="section-title">Backend capability and API catalog</h3>
          <div class="journal-list">${renderJournal(capabilities, "No capability rows.")}</div>
          <div class="journal-list spaced">${apis.map((item) => `
            <article class="journal-row">
              <span class="journal-state">${esc(item.method)} ${esc(item.path)}</span>
              <strong>${esc(item.layer)}</strong>
              <p class="muted">${esc(item.proves)}</p>
            </article>
          `).join("")}</div>
        </section>
      `;
    }

    function renderSourcesTab(score) {
      return `
        <section class="detail-section">
          <h3 class="section-title">Data source register</h3>
          <div class="journal-list">${renderJournal(score.data_sources, "No source rows available.")}</div>
        </section>
        <section class="detail-section">
          <h3 class="section-title">Sandbox readiness</h3>
          <div class="journal-list">
            <article class="journal-row">
              <span class="journal-state">Current cohort</span>
              <strong>Public synthetic data</strong>
              <p class="muted">The repository does not include private IDBI sandbox credentials, customer data, or repayment labels.</p>
            </article>
            <article class="journal-row">
              <span class="journal-state">Feed contract</span>
              <strong>AA/GST/UPI/EPFO payload path</strong>
              <p class="muted">${code("POST /sandbox/score")} accepts sandbox-style payloads and maps them into this same score packet.</p>
            </article>
            <article class="journal-row">
              <span class="journal-state">Optional Stage 2</span>
              <strong>GBM/SHAP and Bedrock</strong>
              <p class="muted">XGBoost/LightGBM SHAP and Bedrock memos are enabled only when approved data, packages, and credentials are supplied.</p>
            </article>
          </div>
        </section>
      `;
    }

    function renderTabContent() {
      const score = state.activeScore;
      if (!score) {
        els.tabContent.innerHTML = `<div class="skeleton">Select a borrower file to render the review packet.</div>`;
        return;
      }
      const views = {
        decision: () => renderDecisionTab(score),
        evidence: () => renderEvidenceTab(score),
        governance: () => renderGovernanceTab(),
        proof: () => renderProofTab(),
        sources: () => renderSourcesTab(score),
      };
      els.drawerTitle.textContent = drawerTitles[state.activeTab] || "Review packet";
      els.tabContent.innerHTML = views[state.activeTab]?.() || views.decision();
    }

    function setTab(tab, openDrawer = true) {
      state.activeTab = tab;
      els.tabs.querySelectorAll("[data-tab]").forEach((button) => {
        button.setAttribute("aria-selected", String(button.dataset.tab === tab));
      });
      renderTabContent();
      if (openDrawer) setDrawerOpen(true);
    }

    async function refreshGovernance() {
      state.governance = await api("/governance");
    }

    async function loadCase(id) {
      state.activeId = id;
      els.msme.value = id;
      renderCases();
      els.caseSummary.innerHTML = `<div class="skeleton">Scoring selected MSME...</div>`;
      els.decisionStamp.innerHTML = `<div class="skeleton">Refreshing decision summary...</div>`;
      els.tabContent.innerHTML = `<div class="skeleton">Preparing review packet...</div>`;
      try {
        const score = await api(`/msmes/${encodeURIComponent(id)}/score`);
        state.activeScore = score;
        await refreshGovernance();
        renderCaseSummary(score);
        renderDecisionStamp(score);
        renderTabContent();
        setApiStatus(true, "Live API");
        updateStatusLine();
      } catch (error) {
        setApiStatus(false, "Offline");
        els.caseSummary.innerHTML = `<div class="error-state">Could not reach the UdyamPulse API. ${esc(error.message)}</div>`;
        els.decisionStamp.innerHTML = `<div class="empty-state">Decision summary unavailable while the API is offline.</div>`;
        els.tabContent.innerHTML = `<div class="empty-state">Review evidence is unavailable while the API is offline.</div>`;
      }
    }

    async function init() {
      try {
        const [health, msmes, portfolio, governance, validation, model, submissionProof] = await Promise.all([
          api("/health"),
          api("/msmes"),
          api("/portfolio"),
          api("/governance"),
          api("/validation/demo"),
          api("/model/status"),
          api("/submission/proof"),
        ]);

        state.health = health;
        state.msmes = msmes;
        state.portfolio = portfolio;
        state.governance = governance;
        state.validation = validation;
        state.model = model;
        state.submissionProof = submissionProof;

        setApiStatus(health.status === "ok", health.status === "ok" ? "Live API" : "Check API");
        updateStatusLine();
        renderPortfolioMetrics();
        renderCases();

        els.msme.addEventListener("change", (event) => loadCase(event.target.value));
        els.caseList.addEventListener("click", (event) => {
          const button = event.target.closest("[data-case]");
          if (button) loadCase(button.dataset.case);
        });
        els.tabs.addEventListener("click", (event) => {
          const button = event.target.closest("[data-tab]");
          if (button) setTab(button.dataset.tab, true);
        });
        els.drawerToggle.addEventListener("click", () => setDrawerOpen(true));
        els.drawerClose.addEventListener("click", () => setDrawerOpen(false));
        els.drawerScrim.addEventListener("click", () => setDrawerOpen(false));
        window.addEventListener("keydown", (event) => {
          if (event.key === "Escape") setDrawerOpen(false);
        });

        await loadCase(state.activeId);
      } catch (error) {
        setApiStatus(false, "Offline");
        els.caseSummary.innerHTML = `<div class="error-state">Startup check failed. ${esc(error.message)}</div>`;
        els.decisionStamp.innerHTML = `<div class="empty-state">Model and audit status could not be fetched.</div>`;
        els.tabContent.innerHTML = `<div class="empty-state">The review shell loaded, but API evidence could not be fetched.</div>`;
      }
    }

    init();
  </script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="theme-color" content="#F4EBDD" />
<meta name="description" content="UdyamPulse is an explainable MSME credit-review cockpit for thin-file lending, model governance, and sandbox readiness." />
<title>UdyamPulse - MSME Credit Review</title>
<link rel="canonical" href="https://id-ysm9.onrender.com/" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%231B2A2F'/%3E%3Cpath d='M8 9h16v2H8zM8 15h16v2H8zM8 21h10v2H8z' fill='%23F4EBDD'/%3E%3Cpath d='M20 19h5v5h-5z' fill='%235B4A8B'/%3E%3C/svg%3E" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>
  <a class="skip-link" href="#mainStage">Skip to credit decision</a>
  <div class="app-canvas">
    <header class="top-index">
      <a class="brand" href="#mainStage" aria-label="UdyamPulse home">
        <span class="brand-mark" aria-hidden="true">Up</span>
        <span>
          <h1>UdyamPulse</h1>
          <p>MSME credit review, without hiding the audit trail.</p>
          <span class="status-line" role="status" aria-label="System status">
            <span id="apiStatus" data-state="checking">Checking API</span>
            <span id="modelStatus">loading model</span>
            <span id="cohortStatus">public synthetic</span>
          </span>
        </span>
      </a>

      <div class="case-picker">
        <label for="msme">Borrower file</label>
        <select id="msme" class="case-select">
          <option>Loading borrower files...</option>
        </select>
      </div>
    </header>

    <section class="file-index" aria-label="Borrower file index">
      <div id="caseList" class="case-list">
        <div class="skeleton">Loading cases...</div>
      </div>
    </section>

    <div class="workspace">
      <main id="mainStage" class="stage-shell" tabindex="-1">
        <section id="caseSummary" class="decision-stage" aria-live="polite">
          <div class="skeleton">Loading borrower assessment...</div>
        </section>

        <section id="portfolioMetrics" class="portfolio-ribbon" aria-label="Portfolio impact"></section>
      </main>

      <aside id="reviewPacket" class="review-packet" aria-labelledby="packetTitle">
        <div class="packet-head">
          <h2 id="packetTitle" class="packet-title">Decision packet</h2>
          <nav id="tabs" class="nav-index" role="tablist" aria-label="Review packet index">
            <button id="tab-decision" type="button" role="tab" data-tab="decision" aria-controls="tabContent" aria-selected="true" tabindex="0">Decision</button>
            <button id="tab-evidence" type="button" role="tab" data-tab="evidence" aria-controls="tabContent" aria-selected="false" tabindex="-1">Evidence</button>
            <button id="tab-model" type="button" role="tab" data-tab="model" aria-controls="tabContent" aria-selected="false" tabindex="-1">Model</button>
            <button id="tab-governance" type="button" role="tab" data-tab="governance" aria-controls="tabContent" aria-selected="false" tabindex="-1">Governance</button>
            <button id="tab-proof" type="button" role="tab" data-tab="proof" aria-controls="tabContent" aria-selected="false" tabindex="-1">Proof</button>
            <button id="tab-sources" type="button" role="tab" data-tab="sources" aria-controls="tabContent" aria-selected="false" tabindex="-1">Sources</button>
          </nav>
        </div>
        <div id="tabContent" class="packet-body" role="tabpanel" aria-labelledby="tab-decision" tabindex="0">
          <div class="skeleton">Preparing review packet...</div>
        </div>
      </aside>
    </div>
  </div>

  <noscript>UdyamPulse needs JavaScript to load the credit-review evidence.</noscript>
  <script src="lib.js" defer></script>
  <script src="app.js" defer></script>
</body>
</html>
